<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#B0B0B0">
<title>BAI Excavating — Fleet Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:Barlow,sans-serif;background:#2C2C2C;color:#F0F0F0;min-height:100vh;font-size:15px}
:root{--bk:#2C2C2C;--bk2:#383838;--bk3:#444;--bk4:#505050;--red:#D42B2B;--red2:#B82020;--redbg:rgba(212,43,43,0.12);--wh:#F0F0F0;--wh3:#888;--bd:rgba(255,255,255,0.09);--bd2:rgba(255,255,255,0.18);--gr:#2EC278;--grbg:rgba(46,194,120,0.10);--or:#F5922F;--orbg:rgba(245,146,47,0.12);--r:10px;--rl:14px}
#topbar{position:sticky;top:0;z-index:200;background:#B0B0B0;border-bottom:2px solid #909090;padding:0 16px;height:60px;display:flex;align-items:center;justify-content:space-between}
.logo-img{height:44px;width:auto;object-fit:contain}
.tbr{display:flex;align-items:center;gap:14px}
.ldot{display:flex;align-items:center;gap:5px;font-size:11px;color:#333}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--gr);box-shadow:0 0 5px var(--gr);animation:pa 2.5s infinite}
@keyframes pa{0%,100%{opacity:1}50%{opacity:.5}}
#clk{font-family:JetBrains Mono,monospace;font-size:11px;color:#333}
#nav{display:flex;background:var(--bk2);border-bottom:1px solid var(--bd);overflow-x:auto;scrollbar-width:none}
#nav::-webkit-scrollbar{display:none}
.nb{flex:1;min-width:55px;max-width:100px;background:none;border:none;border-bottom:3px solid transparent;color:var(--wh3);font-family:Barlow Condensed,sans-serif;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:11px 4px 9px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;justify-content:center;gap:3px;position:relative}
.nb svg{width:12px;height:12px;flex-shrink:0}
.nb.active{color:var(--red);border-bottom-color:var(--red)}
.nbadge{position:absolute;top:6px;right:4px;background:var(--red);color:#fff;font-size:9px;font-weight:700;border-radius:8px;padding:1px 5px;font-family:JetBrains Mono,monospace}
#main{padding:16px;max-width:900px;margin:0 auto}
.krow{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.kpi{background:var(--bk2);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.t::before{background:var(--wh3)}.kpi.ok::before{background:var(--gr)}.kpi.sn::before{background:var(--or)}.kpi.ov::before{background:var(--red)}.kpi.miss::before{background:#9b59b6}
.klbl{font-family:Barlow Condensed,sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--wh3);margin-bottom:6px}
.kval{font-family:Barlow Condensed,sans-serif;font-size:28px;font-weight:800;line-height:1}
.kpi.t .kval{color:var(--wh)}.kpi.ok .kval{color:var(--gr)}.kpi.sn .kval{color:var(--or)}.kpi.ov .kval{color:var(--red)}.kpi.miss .kval{color:#9b59b6}
.hdg{font-family:Barlow Condensed,sans-serif;font-size:10px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--wh3);margin-bottom:8px;margin-top:4px;display:flex;align-items:center;justify-content:space-between}
.eqlist{display:flex;flex-direction:column;gap:7px}
.eqcard{background:var(--bk2);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;cursor:pointer}
.eqcard.open{border-color:rgba(212,43,43,.5)}
.eqhdr{display:flex;align-items:center;padding:13px 14px;gap:11px}
.eqico{width:38px;height:38px;border-radius:8px;background:var(--red);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.eqico svg{width:22px;height:22px;color:#fff}
.eqinf{flex:1;min-width:0}
.eqid{font-family:JetBrains Mono,monospace;font-size:10px;color:var(--wh3);margin-bottom:1px}
.eqnm{font-weight:600;font-size:13px;color:var(--wh);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.eqrt{display:flex;align-items:center;gap:7px;flex-shrink:0}
.hchip{font-family:JetBrains Mono,monospace;font-size:11px;background:var(--bk3);border:1px solid var(--bd);padding:3px 8px;border-radius:6px;color:var(--wh)}
.schip{font-family:Barlow Condensed,sans-serif;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
.s-ok{background:var(--grbg);color:var(--gr)}.s-sn{background:var(--orbg);color:var(--or)}.s-ov{background:var(--redbg);color:var(--red)}
.s-miss{background:rgba(155,89,182,.15);color:#9b59b6}
.chev{color:var(--wh3);transition:transform .2s;flex-shrink:0}
.chev svg{width:15px;height:15px}
.open .chev{transform:rotate(180deg)}
.det{border-top:1px solid var(--bd);padding:14px;background:var(--bk)}
.dmeta{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px}
.df label{font-size:9px;font-family:Barlow Condensed,sans-serif;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--wh3);display:block;margin-bottom:2px}
.df .dv{font-size:13px;font-weight:500;color:var(--wh)}
.svrows{margin-bottom:14px}
.svrow{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.svlbl{font-family:Barlow Condensed,sans-serif;font-size:10px;font-weight:700;color:var(--wh3);width:70px;flex-shrink:0}
.svtrk{flex:1;height:5px;background:var(--bk3);border-radius:3px;overflow:hidden}
.svfil{height:100%;border-radius:3px}
.svfil.ok{background:var(--gr)}.svfil.sn{background:var(--or)}.svfil.ov{background:var(--red)}
.svrem{font-family:JetBrains Mono,monospace;font-size:10px;color:var(--wh3);width:50px;text-align:right;flex-shrink:0}
.upfrm{background:var(--bk2);border:1px solid var(--bd);border-radius:var(--r);padding:12px}
.ufrow{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:7px;align-items:end}
.uflbl{font-family:Barlow Condensed,sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--wh3);margin-bottom:8px}
.ff label{font-size:11px;color:var(--wh3);display:block;margin-bottom:3px}
.ff input,.ff select,.ff textarea{width:100%;background:var(--bk3);border:1px solid var(--bd);border-radius:7px;padding:8px 10px;font-size:13px;color:var(--wh);font-family:Barlow,sans-serif;outline:none;resize:none}
.ff input:focus,.ff select:focus,.ff textarea:focus{border-color:var(--red)}
.ff select option{background:var(--bk3)}
.btn-sv{background:var(--red);color:#fff;border:none;border-radius:7px;padding:0 14px;height:38px;font-family:Barlow Condensed,sans-serif;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.actrow{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
.btn-ol{background:none;border:1px solid var(--bd);border-radius:7px;padding:7px 12px;font-family:Barlow Condensed,sans-serif;font-size:11px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:5px;color:var(--wh3)}
.btn-ol.red{color:var(--red);border-color:rgba(212,43,43,.4);flex:1}.btn-ol.grn{color:var(--gr);border-color:rgba(46,194,120,.3)}.btn-ol.del{color:var(--red);border-color:rgba(212,43,43,.25)}
.btn-ol.purp{color:#9b59b6;border-color:rgba(155,89,182,.35)}
.logfrm{background:var(--bk2);border:1px solid var(--bd);border-radius:var(--rl);padding:14px;margin-bottom:14px}
.lg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.btn-add{background:var(--bk3);color:var(--red);border:1px solid rgba(212,43,43,.35);border-radius:7px;padding:9px 16px;font-family:Barlow Condensed,sans-serif;font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.loge{display:flex;flex-direction:column;gap:7px}
.logitem{background:var(--bk2);border:1px solid var(--bd);border-radius:var(--r);padding:11px 13px;display:grid;grid-template-columns:82px 1fr auto;gap:10px;align-items:start}
.logitem.req{border-left:3px solid var(--red)}
.ldate{font-family:JetBrains Mono,monospace;font-size:10px;color:var(--wh3);line-height:1.5}
.lid{font-family:Barlow Condensed,sans-serif;font-size:11px;font-weight:700;color:var(--red)}
.lwrk{font-size:12px;color:var(--wh);margin-top:1px;line-height:1.4}
.lby{font-size:10px;color:var(--wh3);margin-top:2px}
.lcst{font-family:JetBrains Mono,monospace;font-size:12px;color:var(--wh);text-align:right;white-space:nowrap}
.ltag{font-family:Barlow Condensed,sans-serif;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;display:inline-block;margin-top:2px}
.lt-svc{background:var(--grbg);color:var(--gr)}.lt-req{background:var(--redbg);color:var(--red)}.lt-daily{background:rgba(155,89,182,.15);color:#9b59b6}
.totbar{background:var(--bk3);border:1px solid var(--bd);border-radius:var(--r);padding:11px 14px;display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.tamt{font-family:JetBrains Mono,monospace;font-size:15px;font-weight:500;color:var(--red)}
.phrow{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
.phthumb{width:56px;height:56px;border-radius:6px;object-fit:cover;border:1px solid var(--bd);cursor:pointer}
.btn-ph{background:var(--bk3);border:1px dashed var(--bd2);border-radius:7px;padding:7px 12px;color:var(--wh3);font-size:11px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
input[type=file]{display:none}
.chkitem{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--bd)}
.chkbtns{display:flex;gap:5px;flex-shrink:0}
.ckb{border:none;border-radius:6px;padding:5px 9px;font-size:10px;font-weight:700;cursor:pointer;font-family:Barlow Condensed,sans-serif}
.ckb.ps{background:var(--grbg);color:var(--gr)}.ckb.ps.on{background:var(--gr);color:#fff}
.ckb.fl{background:var(--redbg);color:var(--red)}.ckb.fl.on{background:var(--red);color:#fff}
.ckb.na{background:var(--bk3);color:var(--wh3)}.ckb.na.on{background:var(--bk4);color:var(--wh)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--bk2);border:1px solid var(--bd2);border-top:3px solid var(--red);border-radius:var(--rl);padding:20px;width:100%;max-width:460px;max-height:92vh;overflow-y:auto}
.modal.wide{max-width:540px}
.mttl{font-family:Barlow Condensed,sans-serif;font-size:16px;font-weight:700;color:var(--wh);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.mttl span{color:var(--red)}
.mg{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.mg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.mact{display:flex;gap:8px}
.btn-no{flex:1;background:none;color:var(--wh3);border:1px solid var(--bd);border-radius:7px;padding:10px;font-family:Barlow Condensed,sans-serif;font-size:12px;font-weight:700;cursor:pointer}
.btn-yes{flex:2;background:var(--red);color:#fff;border:none;border-radius:7px;padding:10px;font-family:Barlow Condensed,sans-serif;font-size:12px;font-weight:700;cursor:pointer}
.btn-purp{flex:2;background:#8e44ad;color:#fff;border:none;border-radius:7px;padding:10px;font-family:Barlow Condensed,sans-serif;font-size:12px;font-weight:700;cursor:pointer}
.fmbar{display:flex;justify-content:flex-end;margin-bottom:12px}
.btn-neweq{background:var(--red);color:#fff;border:none;border-radius:7px;padding:8px 16px;font-family:Barlow Condensed,sans-serif;font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.calwrap{background:var(--bk2);border:1px solid var(--bd);border-radius:var(--rl);padding:14px;margin-bottom:12px}
.calhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.calnav{display:flex;align-items:center;gap:10px}
.calnav button{background:var(--bk3);border:1px solid var(--bd);border-radius:6px;color:var(--wh);padding:5px 10px;cursor:pointer;font-size:14px}
.calmth{font-family:Barlow Condensed,sans-serif;font-size:16px;font-weight:700;color:var(--wh)}
.calflt{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.cfbtn{background:var(--bk3);border:1px solid var(--bd);border-radius:20px;padding:4px 11px;font-size:11px;color:var(--wh3);cursor:pointer;font-family:Barlow Condensed,sans-serif;font-weight:700}
.cfbtn.on{background:var(--red);color:#fff;border-color:var(--red)}
.caladj{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:7px;margin-bottom:12px}
.caladj-item{display:flex;align-items:center;gap:6px}
.caladj-id{font-family:JetBrains Mono,monospace;font-size:10px;color:var(--red);width:52px;flex-shrink:0}
.caladj-in{width:44px;background:var(--bk3);border:1px solid var(--bd);border-radius:5px;padding:3px 6px;font-size:11px;color:var(--wh);font-family:JetBrains Mono,monospace;outline:none}
.calgrid{display:flex;flex-direction:column;gap:6px}
.calrow{background:var(--bk2);border:1px solid var(--bd);border-radius:var(--r);padding:10px 13px;display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px;align-items:center}
.cr-id{font-family:JetBrains Mono,monospace;font-size:10px;color:var(--red)}
.cr-nm{font-size:12px;color:var(--wh);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cr-dt{font-family:Barlow Condensed,sans-serif;font-size:12px;font-weight:700;color:var(--wh)}
.dbadge{font-family:JetBrains Mono,monospace;font-size:11px;padding:3px 8px;border-radius:6px}
.dbadge.near{background:var(--redbg);color:var(--red)}.dbadge.mid{background:var(--orbg);color:var(--or)}.dbadge.far{background:var(--grbg);color:var(--gr)}
.pdfsec{background:var(--bk2);border:1px solid var(--bd);border-radius:var(--rl);padding:16px;margin-bottom:12px}
.pdftl{font-family:Barlow Condensed,sans-serif;font-size:14px;font-weight:700;color:var(--wh);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.pdftl svg{width:17px;height:17px;color:var(--red)}
.pdfds{font-size:12px;color:var(--wh3);margin-bottom:12px;line-height:1.5}
.pdfopts{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.pdfopts label{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--wh);cursor:pointer}
.pdfopts input[type=checkbox]{width:16px;height:16px;accent-color:var(--red)}
.eqsel{width:100%;background:var(--bk3);border:1px solid var(--bd);border-radius:7px;padding:9px 10px;font-size:13px;color:var(--wh);font-family:Barlow,sans-serif;outline:none;margin-bottom:12px}
.eqsel option{background:var(--bk3)}
.btn-pdf{background:var(--red);color:#fff;border:none;border-radius:7px;padding:10px 18px;font-family:Barlow Condensed,sans-serif;font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:7px}
.btn-pdf svg{width:15px;height:15px}
.btn-csv{background:var(--bk3);color:var(--gr);border:1px solid rgba(46,194,120,.3);border-radius:7px;padding:9px 14px;font-family:Barlow Condensed,sans-serif;font-size:11px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.csvrow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.qrcanv{border-radius:8px;margin:10px auto;display:block;background:white;padding:12px}
.aiwrap{background:var(--bk2);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden}
.aitop{background:var(--bk3);padding:11px 14px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--bd)}
.aitop svg{width:16px;height:16px;color:var(--red)}
.ailbl{font-family:Barlow Condensed,sans-serif;font-size:12px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--wh)}
.aipow{margin-left:auto;font-size:10px;color:var(--wh3)}
.aimsgs{min-height:200px;max-height:340px;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
.amsg{max-width:88%}.amsg.u{align-self:flex-end}.amsg.b{align-self:flex-start}
.abub{padding:10px 13px;border-radius:12px;font-size:13px;line-height:1.55}
.amsg.u .abub{background:var(--red);color:#fff;border-radius:12px 12px 2px 12px}
.amsg.b .abub{background:var(--bk3);color:var(--wh);border:1px solid var(--bd);border-radius:12px 12px 12px 2px;white-space:pre-wrap}
.dots{display:flex;gap:4px;padding:7px 0}.dots span{width:6px;height:6px;border-radius:50%;background:var(--red);animation:td .9s infinite}
.dots span:nth-child(2){animation-delay:.15s}.dots span:nth-child(3){animation-delay:.3s}
@keyframes td{0%,80%,100%{opacity:.2;transform:translateY(0)}40%{opacity:1;transform:translateY(-5px)}}
.aibot{border-top:1px solid var(--bd);padding:11px}
.airow{display:flex;gap:7px;margin-bottom:9px}
.airow input{flex:1;background:var(--bk3);border:1px solid var(--bd);border-radius:8px;padding:10px 13px;font-size:13px;color:var(--wh);font-family:Barlow,sans-serif;outline:none}
.airow input:focus{border-color:var(--red)}
.btn-snd{background:var(--red);color:#fff;border:none;border-radius:8px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.btn-snd svg{width:16px;height:16px}.btn-snd:disabled{opacity:.4;cursor:not-allowed}
.pills{display:flex;flex-wrap:wrap;gap:5px}
.pill{background:var(--bk3);border:1px solid var(--bd);border-radius:20px;padding:5px 10px;font-size:11px;color:var(--wh3);cursor:pointer}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bk3);border:1px solid var(--bd2);color:var(--red);font-size:12px;font-weight:600;padding:9px 18px;border-radius:24px;opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.pdfst{font-size:11px;color:var(--wh3);margin-top:7px;min-height:16px}
/* DAILY LOG STYLES */
.dl-card{background:var(--bk2);border:1px solid var(--bd);border-radius:var(--rl);margin-bottom:10px;overflow:hidden}
.dl-hdr{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.dl-id{font-family:JetBrains Mono,monospace;font-size:10px;color:var(--red)}
.dl-nm{font-size:13px;font-weight:600;color:var(--wh)}
.dl-badges{display:flex;gap:6px;align-items:center;flex-shrink:0}
.dl-status{font-family:Barlow Condensed,sans-serif;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px}
.dl-ok{background:var(--grbg);color:var(--gr)}.dl-miss{background:rgba(155,89,182,.15);color:#9b59b6}.dl-fail{background:var(--redbg);color:var(--red)}
.dl-body{border-top:1px solid var(--bd);padding:14px;background:var(--bk)}
.dl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.dl-entry{background:var(--bk2);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px}
.dl-date{font-family:JetBrains Mono,monospace;font-size:10px;color:var(--wh3);margin-bottom:4px}
.dl-by{font-size:11px;color:var(--gr);margin-bottom:6px;font-weight:600}
.dl-reading{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.dl-r{font-family:JetBrains Mono,monospace;font-size:11px;color:var(--wh)}
.dl-r span{color:var(--wh3);font-size:9px;text-transform:uppercase;letter-spacing:.5px;display:block}
.dl-chk-sum{font-size:10px;color:var(--wh3)}
.dl-chk-sum.has-fail{color:var(--red);font-weight:600}
.miss-banner{background:rgba(155,89,182,.12);border:1px solid rgba(155,89,182,.3);border-radius:var(--r);padding:10px 14px;font-size:12px;color:#9b59b6;display:flex;align-items:center;gap:8px;margin-bottom:12px}
.dl-filter{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
@media(max-width:600px){#main{padding:12px}.krow{grid-template-columns:repeat(2,1fr)}.dmeta{grid-template-columns:repeat(2,1fr)}.ufrow{grid-template-columns:1fr 1fr}.ufrow .btn-sv{grid-column:1/-1;width:100%}.lg3{grid-template-columns:1fr 1fr}.logitem{grid-template-columns:68px 1fr auto;gap:7px}.calrow{grid-template-columns:1fr 1fr;gap:6px}.mg2{grid-template-columns:1fr}.dl-grid{grid-template-columns:1fr 1fr}}

/* ════════════════ PRO / GLASS LAYER v2 ════════════════
   Same palette — modern type (Inter + Space Grotesk),
   glassmorphism, depth & motion. Remove block to revert.
   ═══════════════════════════════════════════════════════ */
:root{--rxl:18px;--ease:cubic-bezier(.4,0,.2,1);--sh1:0 1px 3px rgba(0,0,0,.28);--sh2:0 8px 28px rgba(0,0,0,.34);--sh3:0 24px 60px rgba(0,0,0,.55);--gred:linear-gradient(135deg,#E13434 0%,#C32323 100%);--glass:rgba(56,56,56,.5);--glass-bd:1px solid rgba(255,255,255,.11);--glass-sh:0 8px 32px rgba(0,0,0,.33),inset 0 1px 0 rgba(255,255,255,.08)}

/* Ambient, on-brand background glows so glass has something to refract */
body{background:radial-gradient(55% 45% at 88% -5%,rgba(212,43,43,.13),transparent 60%),radial-gradient(45% 42% at -5% 105%,rgba(46,194,120,.07),transparent 55%),radial-gradient(130% 120% at 50% -10%,#3A3A3A 0%,#2C2C2C 45%,#232323 100%);background-attachment:fixed;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}

/* ── Type: Inter (UI) · Space Grotesk (display) · JetBrains Mono (data) ── */
body,input,select,textarea,button{font-family:'Inter',system-ui,sans-serif;letter-spacing:0}
.nb,.klbl,.hdg,.schip,.svlbl,.uflbl,.btn-sv,.btn-ol,.btn-add,.lid,.ltag,.ckb,.btn-no,.btn-yes,.btn-purp,.btn-neweq,.cfbtn,.cr-dt,.btn-pdf,.btn-csv,.ailbl,.dl-status,.dl-nm,.eqnm{font-family:'Inter',sans-serif}
.kval,.mttl,.calmth,.pdftl{font-family:'Space Grotesk','Inter',sans-serif;letter-spacing:-.6px;font-weight:700}
.klbl,.hdg,.uflbl,.svlbl,.ailbl{letter-spacing:1.2px}
.eqnm,.dl-nm{font-weight:600}

/* ── Frosted topbar & sticky nav ── */
#topbar{background:linear-gradient(180deg,rgba(199,199,199,.82),rgba(167,167,167,.82));-webkit-backdrop-filter:blur(16px) saturate(140%);backdrop-filter:blur(16px) saturate(140%);border-bottom:1px solid rgba(255,255,255,.22);box-shadow:0 4px 22px rgba(0,0,0,.3);padding:0 18px}
#nav{position:sticky;top:60px;z-index:190;background:rgba(40,40,40,.55);-webkit-backdrop-filter:blur(18px) saturate(160%);backdrop-filter:blur(18px) saturate(160%);border-bottom:1px solid rgba(255,255,255,.08);box-shadow:0 8px 24px rgba(0,0,0,.22)}
.nb{transition:color .18s var(--ease),border-color .18s var(--ease)}
.nb:hover:not(.active){color:var(--wh)}
.nb.active{text-shadow:0 0 16px rgba(212,43,43,.5)}

/* ── Glass surfaces ── */
.eqcard,.dl-card,.calwrap,.logfrm,.upfrm,.pdfsec,.aiwrap,.totbar,.logitem,.calrow{background:var(--glass);-webkit-backdrop-filter:blur(16px) saturate(150%);backdrop-filter:blur(16px) saturate(150%);border:var(--glass-bd);box-shadow:var(--glass-sh)}
.kpi{background:linear-gradient(160deg,rgba(74,74,74,.55),rgba(48,48,48,.42));-webkit-backdrop-filter:blur(16px) saturate(150%);backdrop-filter:blur(16px) saturate(150%);border:var(--glass-bd);box-shadow:var(--glass-sh);transition:transform .2s var(--ease),box-shadow .2s var(--ease)}
.kpi:hover{transform:translateY(-2px);box-shadow:0 14px 38px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.1)}
.kpi::before{height:3px;filter:saturate(1.15) brightness(1.1)}
.eqcard,.dl-card{transition:transform .2s var(--ease),box-shadow .2s var(--ease),border-color .2s var(--ease)}
.eqcard:hover,.dl-card:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.2);box-shadow:0 14px 38px rgba(0,0,0,.42),inset 0 1px 0 rgba(255,255,255,.1)}
.eqcard.open{border-color:rgba(212,43,43,.55);box-shadow:0 0 0 1px rgba(212,43,43,.35),var(--sh2);transform:none}
.eqico{background:var(--gred);border-radius:11px;box-shadow:0 4px 14px rgba(212,43,43,.45),inset 0 1px 0 rgba(255,255,255,.25)}

/* Expanded/nested areas stay readable (no muddy double-blur) */
.det,.dl-body{background:rgba(28,28,28,.85);border-top-color:rgba(255,255,255,.08)}

/* Chips — tighter tracking */
.schip,.dl-status,.ltag,.dbadge{letter-spacing:.4px}

/* Inputs — smooth focus glow */
.ff input,.ff select,.ff textarea,.airow input,.eqsel,.caladj-in,.calnav button{transition:border-color .16s var(--ease),box-shadow .16s var(--ease),background .16s var(--ease)}
.ff input:focus,.ff select:focus,.ff textarea:focus,.airow input:focus,.eqsel:focus,.caladj-in:focus{box-shadow:0 0 0 3px rgba(212,43,43,.18)}

/* Primary red buttons — gradient + glass sheen */
.btn-sv,.btn-yes,.btn-pdf,.btn-neweq,.btn-snd{background:var(--gred);box-shadow:0 3px 12px rgba(212,43,43,.32),inset 0 1px 0 rgba(255,255,255,.18);transition:filter .15s var(--ease),box-shadow .15s var(--ease),transform .1s var(--ease)}
.btn-purp{background:linear-gradient(135deg,#9b59b6 0%,#7d3f97 100%);box-shadow:0 3px 12px rgba(155,89,182,.32)}
.btn-sv:hover,.btn-yes:hover,.btn-pdf:hover,.btn-neweq:hover,.btn-snd:hover,.btn-purp:hover{filter:brightness(1.09)}
.btn-sv:active,.btn-yes:active,.btn-pdf:active,.btn-neweq:active,.btn-snd:active,.btn-purp:active{transform:translateY(1px)}

/* Outline / pill controls — feedback */
.btn-ol,.cfbtn,.pill,.btn-csv,.btn-no,.btn-ph,.btn-add{transition:all .16s var(--ease)}
.btn-ol:hover,.btn-csv:hover,.btn-add:hover{border-color:var(--bd2);filter:brightness(1.1)}
.cfbtn:hover:not(.on),.pill:hover{border-color:var(--bd2);color:var(--wh);background:rgba(80,80,80,.6)}
.btn-ol:active,.cfbtn:active,.pill:active,.btn-no:active,.btn-add:active{transform:translateY(1px)}

/* Modal — heavy frost + red accent + entrance */
.overlay{background:rgba(8,8,8,.6);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);animation:ovin .2s var(--ease)}
.modal{background:rgba(46,46,46,.72);-webkit-backdrop-filter:blur(30px) saturate(160%);backdrop-filter:blur(30px) saturate(160%);border:1px solid rgba(255,255,255,.14);border-top:2px solid rgba(212,43,43,.8);box-shadow:var(--sh3),inset 0 1px 0 rgba(255,255,255,.08);border-radius:var(--rxl);animation:moin .28s var(--ease)}
@keyframes ovin{from{opacity:0}to{opacity:1}}
@keyframes moin{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

/* AI panel */
.aitop{background:rgba(40,40,40,.5);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
.amsg.u .abub{box-shadow:0 3px 12px rgba(212,43,43,.3)}
.amsg.b .abub{box-shadow:var(--sh1)}

/* Toast — frosted */
#toast{box-shadow:var(--sh2);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);background:rgba(60,60,60,.8);border:1px solid rgba(255,255,255,.14)}

/* Empty states */
.empty{display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center;padding:44px 24px;border-radius:var(--rl);background:var(--glass);border:var(--glass-bd);box-shadow:var(--glass-sh);-webkit-backdrop-filter:blur(16px) saturate(150%);backdrop-filter:blur(16px) saturate(150%)}
.empty-ic{width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;background:rgba(212,43,43,.12);border:1px solid rgba(212,43,43,.28)}
.empty-ic svg{width:26px;height:26px;color:var(--red)}
.empty-ti{font-family:'Space Grotesk','Inter',sans-serif;font-weight:600;font-size:16px;color:var(--wh);letter-spacing:-.3px}
.empty-tx{font-size:13px;color:var(--wh3);max-width:270px;line-height:1.55}
.empty .btn-neweq{margin-top:4px}

/* Slim custom scrollbars */
*::-webkit-scrollbar{width:9px;height:9px}
*::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:6px;border:2px solid transparent;background-clip:padding-box}
*::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.26);background-clip:padding-box}
*::-webkit-scrollbar-track{background:transparent}

@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ── Equipment Requests + Approvals ── */
.rqseg{display:flex;gap:6px;margin-bottom:14px;background:var(--bk2);border:1px solid var(--bd);border-radius:11px;padding:4px}
.rqseg button{flex:1;background:none;border:none;border-radius:8px;padding:10px;font-family:'Inter',sans-serif;font-weight:700;font-size:12px;letter-spacing:.4px;color:var(--wh3);cursor:pointer;transition:all .16s var(--ease)}
.rqseg button.on{background:var(--gred);color:#fff;box-shadow:0 3px 12px rgba(212,43,43,.3)}
.rqform{background:var(--glass);-webkit-backdrop-filter:blur(16px) saturate(150%);backdrop-filter:blur(16px) saturate(150%);border:var(--glass-bd);box-shadow:var(--glass-sh);border-radius:var(--rl);padding:16px;margin-bottom:18px}
.rqgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.rqgrid .full{grid-column:1/-1}
.btn-rq{width:100%;background:var(--gred);color:#fff;border:none;border-radius:8px;padding:11px;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;letter-spacing:.4px;cursor:pointer;box-shadow:0 3px 12px rgba(212,43,43,.32),inset 0 1px 0 rgba(255,255,255,.18)}
.btn-rq:hover{filter:brightness(1.09)}.btn-rq:active{transform:translateY(1px)}
.rqitem{background:var(--glass);-webkit-backdrop-filter:blur(16px) saturate(150%);backdrop-filter:blur(16px) saturate(150%);border:var(--glass-bd);box-shadow:var(--glass-sh);border-radius:var(--r);padding:13px 15px;margin-bottom:10px}
.rqit-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.rqit-ti{font-family:'Space Grotesk','Inter',sans-serif;font-weight:700;font-size:14px;color:var(--wh);letter-spacing:-.3px}
.rqit-su{font-size:11px;color:var(--wh3);margin-top:2px}
.rqit-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px;margin-top:11px}
.rqit-meta>div{font-size:13px;color:var(--wh)}
.rqit-meta b{color:var(--wh3);font-weight:600;font-size:9px;text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:1px}
.rqtag{font-family:'Inter',sans-serif;font-weight:700;font-size:9px;letter-spacing:.6px;padding:3px 9px;border-radius:20px;white-space:nowrap}
.rqtag.owned{background:rgba(46,194,120,.14);color:var(--gr);border:1px solid rgba(46,194,120,.3)}
.rqtag.rental{background:rgba(245,146,47,.14);color:var(--or);border:1px solid rgba(245,146,47,.32)}
.rqtag.pending{background:rgba(245,146,47,.14);color:var(--or);border:1px solid rgba(245,146,47,.3)}
.rqtag.approved{background:rgba(46,194,120,.14);color:var(--gr);border:1px solid rgba(46,194,120,.3)}
.rqtags{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.rqacts{display:flex;gap:8px;margin-top:13px}
.btn-app{flex:1;background:var(--gr);color:#06140d;border:none;border-radius:7px;padding:9px;font-family:'Inter',sans-serif;font-weight:700;font-size:12px;cursor:pointer}
.btn-app:hover{filter:brightness(1.08)}.btn-app:active{transform:translateY(1px)}
.btn-den{flex:1;background:none;color:var(--red);border:1px solid rgba(212,43,43,.4);border-radius:7px;padding:9px;font-family:'Inter',sans-serif;font-weight:700;font-size:12px;cursor:pointer}
.btn-den:active{transform:translateY(1px)}
.adlock{max-width:340px;margin:40px auto;text-align:center;background:var(--glass);-webkit-backdrop-filter:blur(16px) saturate(150%);backdrop-filter:blur(16px) saturate(150%);border:var(--glass-bd);box-shadow:var(--glass-sh);border-radius:var(--rl);padding:32px 24px}
.adlock-ic{width:50px;height:50px;border-radius:14px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;background:rgba(212,43,43,.12);border:1px solid rgba(212,43,43,.3)}
.adlock-ic svg{width:25px;height:25px;color:var(--red)}
.adlock .mttl{justify-content:center}
.adlock-sub{font-size:12px;color:var(--wh3);line-height:1.5;max-width:240px;margin:0 auto}
.adlock input{width:100%;background:var(--bk3);border:1px solid var(--bd);border-radius:8px;padding:11px 12px;font-size:15px;color:var(--wh);text-align:center;letter-spacing:4px;margin:16px 0;outline:none;font-family:'Space Grotesk',sans-serif}
.adlock input:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(212,43,43,.18)}
.rqnone{background:var(--bk2);border:1px solid var(--bd);border-radius:var(--r);padding:20px;text-align:center;color:var(--wh3);font-size:13px;margin-bottom:14px}
/* month calendar */
.mcal{background:var(--glass);-webkit-backdrop-filter:blur(16px) saturate(150%);backdrop-filter:blur(16px) saturate(150%);border:var(--glass-bd);box-shadow:var(--glass-sh);border-radius:var(--rl);padding:14px}
.mcal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.mcal-mth{font-family:'Space Grotesk','Inter',sans-serif;font-weight:700;font-size:15px;color:var(--wh);letter-spacing:-.4px}
.mcal-nav{display:flex;gap:6px}
.mcal-nav button{width:30px;height:30px;background:var(--bk3);border:1px solid var(--bd);border-radius:8px;color:var(--wh);cursor:pointer;font-size:15px;line-height:1}
.mcal-nav button:hover{border-color:var(--red)}
.mcal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.mcal-dow{text-align:center;font-size:9px;font-weight:700;letter-spacing:.5px;color:var(--wh3);text-transform:uppercase;padding:4px 0}
.mcal-cell{min-height:66px;background:var(--bk2);border:1px solid var(--bd);border-radius:8px;padding:4px;overflow:hidden}
.mcal-cell.out{opacity:.32}
.mcal-cell.today{border-color:var(--red);box-shadow:inset 0 0 0 1px rgba(212,43,43,.4)}
.mcal-dn{font-size:10px;color:var(--wh3);font-weight:700;margin-bottom:3px;padding-left:1px}
.mcal-ev{font-size:9px;line-height:1.3;font-weight:700;color:#06140d;background:var(--gr);border-radius:3px;padding:2px 4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mcal-ev.rental{background:var(--or);color:#1a0f02}
.mcal-lgnd{display:flex;gap:14px;margin-top:11px;font-size:10px;color:var(--wh3)}
.mcal-lgnd span{display:inline-flex;align-items:center;gap:5px}
.mcal-lgnd i{width:10px;height:10px;border-radius:3px;display:inline-block}
@media(max-width:600px){.rqgrid{grid-template-columns:1fr}.rqit-meta{grid-template-columns:1fr}.mcal-cell{min-height:50px}.mcal-grid{gap:3px}}
</style>

/* ─── UTILITIES ─── */
function gs(h,l,i){if(!l)return"ok";var n=l+i;if(h>=n)return"ov";if(n-h<=50)return"sn";return"ok";}
function gw(eq){var a=[gs(eq.hrs,eq.s500,500),gs(eq.hrs,eq.s1k,1000),gs(eq.hrs,eq.s2k,2000)];if(a.indexOf("ov")>=0)return"ov";if(a.indexOf("sn")>=0)return"sn";return"ok";}
function sl(s){return s==="ov"?"OVERDUE":s==="sn"?"DUE SOON":"OK";}
function pct(h,l,d){if(!l)return 0;return Math.min(100,Math.round((h-l)/d*100));}
function nid(){var n=FLEET.map(function(e){return parseInt(e.id.replace("EQ-",""))||0;});return"EQ-"+String(Math.max.apply(null,n.concat(0))+1).padStart(3,"0");}
function todayStr(){var d=new Date();return((d.getMonth()+1)+"").padStart(2,"0")+"/"+((d.getDate())+"").padStart(2,"0")+"/"+d.getFullYear();}
function fmtD(d){return((d.getMonth()+1)+"").padStart(2,"0")+"/"+((d.getDate())+"").padStart(2,"0")+"/"+d.getFullYear();}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function el(id){return document.getElementById(id);}
function val(id){return el(id)?el(id).value:"";}
function ival(id){return parseInt(val(id))||0;}
function fval(id){return parseFloat(val(id))||0;}
function mk(tag,attrs,text){
  var e=document.createElement(tag);
  if(attrs)Object.keys(attrs).forEach(function(k){
    if(k==="cls")e.className=attrs[k];
    else if(k==="html")e.innerHTML=attrs[k];
    else e.setAttribute(k,attrs[k]);
  });
  if(text!==undefined)e.textContent=text;
  return e;
}
function ap(par){var args=Array.prototype.slice.call(arguments,1);args.forEach(function(c){if(c)par.appendChild(c);});return par;}
function smod(node){var m=el("mod");m.innerHTML="";if(typeof node==="string"){m.innerHTML=node;}else{m.appendChild(node);}}
function cmod(){el("mod").innerHTML="";}
function toast(msg){var t=el("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2800);}
function uclk(){var c=el("clk");if(c)c.textContent=new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});}

/* ─── DAILY LOG HELPERS ─── */
function hasDailyToday(eqId) {
  var entries = DAILY[eqId] || [];
  var today = todayStr();
  return entries.some(function(e){return e.date===today;});
}
function countMissingToday() {
  return FLEET.filter(function(eq){return !hasDailyToday(eq.id);}).length;
}
function getDailyResult(entry) {
  if (!entry.checks) return "Passed";
  var vals = Object.values(entry.checks);
  if (vals.some(function(v){return v==="fl";})) return "Failed";
  return "Passed";
}

/* ─── DEEP LINKS (QR codes) ───
   A QR encodes <app-url>#daily/EQ-001. Scanning opens the app straight
   to that unit's daily report form. One file, no separate pages. */
function dailyLink(id){return location.origin+location.pathname+"#daily/"+encodeURIComponent(id);}
function findEqIdx(id){for(var k=0;k<FLEET.length;k++){if(FLEET[k].id===id)return k;}return -1;}
function openDailyById(id){
  APP.dlOpen=id;ST("daily");
  var idx=findEqIdx(id);
  if(idx>=0)openDailyForm(idx);
  else toast("Unit "+id+" not in fleet");
}
function applyDeepLink(){
  var h=location.hash||"";
  var m=h.match(/^#daily\/(.+)$/);
  if(m){openDailyById(decodeURIComponent(m[1]));return true;}
  if(/^#approve/i.test(h)){ST("adm");return true;}
  if(/^#requests?$/i.test(h)){ST("req");return true;}
  return false;
}
window.addEventListener("hashchange",applyDeepLink);
function render(){
  var m=el("main");m.innerHTML="";
  updateBadge();
  if(APP.tab==="dash")rDash(m);
  else if(APP.tab==="equip")rEquip(m);
  else if(APP.tab==="daily")rDaily(m);
  else if(APP.tab==="log")rLog(m);
  else if(APP.tab==="cal")rCal(m);

}

function submitDaily(i,eq,chklist,chkState){
  var opName=val("dr-op").trim();
  var hrs=ival("dr-hrs");
  if(!opName){toast("Operator name required.");return;}
  if(!hrs){toast("Hour meter reading required.");return;}

  var hasFail=Object.values(chkState).some(function(v){return v==="fl";});
  var failItems=chklist.filter(function(c){return chkState[c.id]==="fl";}).map(function(c){return c.lbl;});
  var result=hasFail?"Failed":"Passed";
  var notes=val("dr-notes").trim();

  if(!DAILY[eq.id])DAILY[eq.id]=[];
  var dailyEntry={
    date:todayStr(),
    ts:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),
    op:opName,
    hrs:hrs,
    fuel:val("dr-fuel"),
    job:val("dr-job"),
    checks:Object.assign({},chkState),
    checklistType:eq.type,
    result:result,
    failItems:failItems,
    notes:notes
  };
  DAILY[eq.id].unshift(dailyEntry);
  dbInsertDaily(eq.id,dailyEntry);

  /* update fleet reading */
  FLEET[i].hrs=hrs;
  FLEET[i].fuel=val("dr-fuel");
  dbUpsertUnit(FLEET[i]);

  /* add to main log as inspection */
  var sum="Daily report by "+opName+" - "+result+(hasFail?" FAIL: "+failItems.join(", "):"")+(notes?" | "+notes:"");
  var dailyLog={date:todayStr(),id:eq.id,unit:eq.make+" "+eq.model,hrs:hrs,type:"Daily Report",work:sum,by:opName,reqBy:"",reqDate:"",parts:0,labor:0,isReq:false,photos:[]};
  LOG.unshift(dailyLog);
  dbInsertLog(dailyLog);

  cmod();
  toast("Daily report submitted for "+eq.id+" - "+result);
  render();
}

function nrid(){var n=REQUESTS.map(function(r){return parseInt((r.id||"").replace("REQ-",""))||0;});return"REQ-"+String(Math.max.apply(null,n.concat(0))+1).padStart(3,"0");}
function fmtReqDate(s){if(!s)return"--";var p=String(s).split("-");if(p.length!==3)return s;return p[1]+"/"+p[2]+"/"+p[0];}
function parseDateInput(s){if(!s)return null;var p=String(s).split("-");if(p.length!==3)return null;return new Date(parseInt(p[0],10),parseInt(p[1],10)-1,parseInt(p[2],10));}
function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function reqCoversDay(r,cd){
  var start=parseDateInput(r.neededBy);if(!start)return false;
  var end=parseDateInput(r.endDate)||start;
  var c=new Date(cd.getFullYear(),cd.getMonth(),cd.getDate()).getTime();
  var s=new Date(start.getFullYear(),start.getMonth(),start.getDate()).getTime();
  var e=new Date(end.getFullYear(),end.getMonth(),end.getDate()).getTime();
  return c>=s&&c<=e;
}

function buildReqCalendar(){
  var wrap=mk("div",{cls:"mcal"});
  var now=new Date(),vd=new Date(now.getFullYear(),now.getMonth()+APP.reqCalOff,1);
  var hd=mk("div",{cls:"mcal-hd"});
  var nav=mk("div",{cls:"mcal-nav"});
  var bp=mk("button",null,"‹");bp.addEventListener("click",function(){APP.reqCalOff--;render();});
  var bn=mk("button",null,"›");bn.addEventListener("click",function(){APP.reqCalOff++;render();});
  ap(nav,bp,bn);
  ap(hd,mk("div",{cls:"mcal-mth"},vd.toLocaleString("default",{month:"long",year:"numeric"})),nav);
  wrap.appendChild(hd);
  var grid=mk("div",{cls:"mcal-grid"});
  ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(function(d){grid.appendChild(mk("div",{cls:"mcal-dow"},d));});
  var startDow=new Date(vd.getFullYear(),vd.getMonth(),1).getDay();
  var cellStart=new Date(vd.getFullYear(),vd.getMonth(),1-startDow);
  var approved=REQUESTS.filter(function(r){return r.status==="approved";});
  for(var c=0;c<42;c++){
    var cd=new Date(cellStart.getFullYear(),cellStart.getMonth(),cellStart.getDate()+c);
    var inMonth=cd.getMonth()===vd.getMonth();
    var cell=mk("div",{cls:"mcal-cell"+(inMonth?"":" out")+(sameDay(cd,now)?" today":"")});
    cell.appendChild(mk("div",{cls:"mcal-dn"},String(cd.getDate())));
    approved.forEach(function(r){
      if(!reqCoversDay(r,cd))return;
      var label=r.type==="owned"?(r.eqId||r.eqName):(r.makeModel||r.equipType);
      var ev=mk("div",{cls:"mcal-ev "+(r.type==="rental"?"rental":"owned")},label);
      ev.setAttribute("title",(r.eqName||r.equipType)+" — "+r.requester+" ("+r.job+")");
      cell.appendChild(ev);
    });
    grid.appendChild(cell);
  }
  wrap.appendChild(grid);
  var lg=mk("div",{cls:"mcal-lgnd"});
  lg.appendChild(mk("span",{html:"<i style='background:var(--gr)'></i>Owned"}));
  lg.appendChild(mk("span",{html:"<i style='background:var(--or)'></i>Rental"}));
  wrap.appendChild(lg);
  return wrap;
}

  if(appr.length===0)m.appendChild(mk("div",{cls:"rqnone"},"No approved requests yet."));
  else appr.sort(function(a,b){return (parseDateInput(a.neededBy)||0)-(parseDateInput(b.neededBy)||0);}).forEach(function(r){m.appendChild(buildReqItem(r,false));});

function buildReqItem(r,actions){
  var it=mk("div",{cls:"rqitem"});
  var top=mk("div",{cls:"rqit-top"});
  var left=mk("div");
  var title=r.type==="owned"?((r.eqId?r.eqId+" · ":"")+(r.eqName||"")):(r.equipType+(r.makeModel?" · "+r.makeModel:""));
  left.appendChild(mk("div",{cls:"rqit-ti"},title));
  left.appendChild(mk("div",{cls:"rqit-su"},r.id+" • requested "+(r.created||"")));
  top.appendChild(left);
  var tags=mk("div",{cls:"rqtags"});
  tags.appendChild(mk("span",{cls:"rqtag "+r.type},r.type==="owned"?"OWNED":"RENTAL"));
  tags.appendChild(mk("span",{cls:"rqtag "+r.status},String(r.status||"").toUpperCase()));
  top.appendChild(tags);
  it.appendChild(top);
  var meta=mk("div",{cls:"rqit-meta"});
  [["Requester",r.requester],["Job / Site",r.job],["Needed By",fmtReqDate(r.neededBy)],["Expected End",fmtReqDate(r.endDate)]].forEach(function(p){
    var c=mk("div");c.appendChild(mk("b",null,p[0]));c.appendChild(document.createTextNode(p[1]||"--"));meta.appendChild(c);
  });
  it.appendChild(meta);
  if(actions){
    var acts=mk("div",{cls:"rqacts"});
    var ya=mk("button",{cls:"btn-app"},"✓ Approve");ya.addEventListener("click",function(){reqApprove(r.id);});
    var na=mk("button",{cls:"btn-den"},"✕ Deny");na.addEventListener("click",function(){reqDeny(r.id);});
    ap(acts,ya,na);it.appendChild(acts);
  }
  return it;
}
function reqApprove(id){
  var r=REQUESTS.find(function(x){return x.id===id;});if(!r)return;
  r.status="approved";dbUpsertReq(r);toast(id+" approved — added to schedule");render();
}
function reqDeny(id){
  var i=REQUESTS.findIndex(function(x){return x.id===id;});if(i<0)return;
  REQUESTS.splice(i,1);dbDeleteReq(id);toast(id+" denied");render();
}

/* Notify the fleet manager of a new request (fire-and-forget). */
function notifyRequest(r){
  try{
    fetch("/api/request-notify",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(r)})
      .then(function(res){return res.json().catch(function(){return{};});})
      .then(function(j){if(!j||!j.ok)console.warn("[request-notify]",j);})
      .catch(function(e){console.warn("[request-notify]",e);});
  }catch(e){console.warn("[request-notify]",e);}
}

function dbErr(r){ if(r && r.error) console.error("[supabase]", r.error.message || r.error); }

/* Load everything from the DB and replace the in-memory stores. */
async function dbLoad(){
  if(!sb) return false;
  try{
    var f = await sb.from("fleet").select("payload").order("id",{ascending:true});
    var l = await sb.from("logs").select("payload").order("ts",{ascending:false});
    var d = await sb.from("daily_reports").select("eq_id,payload").order("ts",{ascending:false});
    var rq = await sb.from("requests").select("payload").order("ts",{ascending:false});
    if(f.error||l.error||d.error){ dbErr(f); dbErr(l); dbErr(d); return false; }
    FLEET = f.data.map(function(r){ return r.payload; });
    LOG   = l.data.map(function(r){ return r.payload; });
    DAILY = {};
    d.data.forEach(function(r){ (DAILY[r.eq_id] = DAILY[r.eq_id] || []).push(r.payload); });
    if(rq.error){ dbErr(rq); }                          /* requests table optional — don't fail the load */
    else REQUESTS = rq.data.map(function(r){ return r.payload; });
    return true;
  }catch(e){ console.error("[supabase] dbLoad failed", e); return false; }
}

/* Optimistic write helpers — fire-and-forget so the UI stays instant. */
function dbUpsertUnit(u){ if(sb) sb.from("fleet").upsert({id:u.id, payload:u, updated_at:new Date().toISOString()}).then(dbErr); }
function dbDeleteUnit(id){ if(sb) sb.from("fleet").delete().eq("id", id).then(dbErr); }
function dbInsertLog(e){ if(sb) sb.from("logs").insert({ts:Date.now(), payload:e}).then(dbErr); }
function dbInsertDaily(eqId,e){ if(sb) sb.from("daily_reports").insert({eq_id:eqId, ts:Date.now(), payload:e}).then(dbErr); }
function dbUpsertReq(r){ if(sb) sb.from("requests").upsert({id:r.id, ts:r.ts||Date.now(), payload:r}).then(dbErr); }
function dbDeleteReq(id){ if(sb) sb.from("requests").delete().eq("id", id).then(dbErr); }

function dbInit(){
  render();                       /* instant paint with whatever's in memory */
  if(!sb){ console.warn("[supabase] not configured — running in-memory only"); applyDeepLink(); return; }
  dbLoad().then(function(ok){ if(ok) render(); applyDeepLink(); });
}
